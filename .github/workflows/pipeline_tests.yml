name: Pipeline Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

      - name: Scan for hardcoded AWS credentials
        run: |
          if grep -r "AKIA[0-9A-Z]{16}" . --include="*.py" --include="*.sql" --include="*.yml" --exclude-dir=".git"; then
            echo "ERROR: Hardcoded AWS access key found!"
            exit 1
          fi
          echo "Credential scan passed — no hardcoded keys found."
